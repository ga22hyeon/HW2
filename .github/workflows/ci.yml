name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  # Docker Hub 저장소 이름 (원하는 이름이나 환경변수에 맞게 수정 가능)
  DOCKER_IMAGE_NAME: facial-age-prediction-api
  DOCKER_HUB_ID: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest

    steps:
      # 1. 원격 레포지토리 코드 체크아웃
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Docker 빌드를 위해 QEMU 세팅 (다중 아키텍처 지원, 생략 가능)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 3. Docker Buildx 설정 (향상된 빌드, 캐싱 지원)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. GitHub Secrets를 이용하여 Docker Hub 로그인
      - name: Login to Docker Hub
        # Pull Request 시에는 이미지를 DockerHub에 푸시할 필요가 없으므로 로그인을 생략합니다.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }} # (또는 DOCKER_PASSWORD)

      # 5. Docker 이미지 빌드 및 푸시
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Pull Request 트리거 시에는 빌드만 테스트하고 Push는 하지 않음
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.DOCKER_HUB_ID }}/${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ env.DOCKER_HUB_ID }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          # 빌드 속도 향상을 위해 GitHub Actions 인프라를 활용하여 레이어 캐싱 설정
          cache-from: type=gha
          cache-to: type=gha,mode=max
